apiVersion: v1
kind: Namespace
metadata:
  name: raganything
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: raganything-config
  namespace: raganything
data:
  PARSER: "mineru"
  PARSE_METHOD: "auto"
  WORKING_DIR: "/app/rag_storage"
  OUTPUT_DIR: "/app/output"
  ENABLE_IMAGE_PROCESSING: "true"
  ENABLE_TABLE_PROCESSING: "true"
  ENABLE_EQUATION_PROCESSING: "true"
  CONTEXT_WINDOW: "1"
  CONTEXT_MODE: "page"
  MAX_CONTEXT_TOKENS: "2000"
  MAX_CONCURRENT_FILES: "1"
---
apiVersion: v1
kind: Secret
metadata:
  name: raganything-secrets
  namespace: raganything
type: Opaque
stringData:
  OPENAI_API_KEY: "your-openai-api-key-here"  # Replace with actual key
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: raganything-storage
  namespace: raganything
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard  # Adjust based on your cluster
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: raganything-models
  namespace: raganything
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard  # Adjust based on your cluster
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: raganything
  namespace: raganything
  labels:
    app: raganything
spec:
  replicas: 1
  selector:
    matchLabels:
      app: raganything
  template:
    metadata:
      labels:
        app: raganything
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: raganything
        image: your-registry/raganything:latest  # Replace with your image
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: raganything-config
        - secretRef:
            name: raganything-secrets
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
        volumeMounts:
        - name: storage
          mountPath: /app/rag_storage
        - name: storage
          mountPath: /app/output
          subPath: output
        - name: storage
          mountPath: /app/logs
          subPath: logs
        - name: models
          mountPath: /home/raguser/.mineru/models
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "import raganything; print('OK')"
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          exec:
            command:
            - python
            - -c
            - "import raganything; print('OK')"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: raganything-storage
      - name: models
        persistentVolumeClaim:
          claimName: raganything-models
---
apiVersion: v1
kind: Service
metadata:
  name: raganything
  namespace: raganything
  labels:
    app: raganything
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: raganything
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: raganything-hpa
  namespace: raganything
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: raganything
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: raganything-pdb
  namespace: raganything
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: raganything